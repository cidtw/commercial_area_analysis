<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>__TITLE__</title>
    <style>
      :root {
        --surface-primary: #f4f6fa;
        --surface-secondary: #edf2f8;
        --surface-elevated: #ffffff;
        --text-primary: #191f28;
        --text-secondary: #4e5968;
        --text-tertiary: #8b95a1;
        --border-default: #dbe2ea;
        --accent-primary: #3182f6;
        --accent-soft: rgba(49, 130, 246, 0.1);
        --status-success: #2f9e5b;
        --shadow-soft: 0 24px 60px rgba(15, 23, 42, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at top left, rgba(49, 130, 246, 0.16), transparent 24%),
          radial-gradient(circle at right 18%, rgba(47, 158, 91, 0.1), transparent 18%),
          linear-gradient(180deg, #fbfdff 0%, var(--surface-primary) 42%, #ebf2f8 100%);
        color: var(--text-primary);
        font-family: "Pretendard Variable", Pretendard, "Segoe UI", system-ui, sans-serif;
      }

      .poster {
        width: 1600px;
        min-height: 947px;
        margin: 0 auto;
        padding: 52px;
      }

      .frame {
        position: relative;
        overflow: hidden;
        padding: 40px;
        border: 1px solid var(--border-default);
        border-radius: 36px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: var(--shadow-soft);
      }

      .frame::before {
        position: absolute;
        inset: 0;
        background:
          linear-gradient(135deg, rgba(49, 130, 246, 0.06), transparent 38%),
          radial-gradient(circle at 88% 0%, rgba(49, 130, 246, 0.16), transparent 24%);
        content: "";
        pointer-events: none;
      }

      .grid {
        position: relative;
        z-index: 1;
        display: grid;
        gap: 24px;
        grid-template-columns: 1.2fr 0.8fr;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-primary);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 18px 0 0;
        font-size: 58px;
        line-height: 1.08;
        letter-spacing: -0.04em;
      }

      .lead {
        max-width: 780px;
        margin: 22px 0 0;
        color: var(--text-secondary);
        font-size: 18px;
        line-height: 1.65;
      }

      .chips {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 24px;
      }

      .chip {
        display: inline-flex;
        align-items: center;
        padding: 10px 14px;
        border: 1px solid var(--border-default);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.84);
        color: var(--text-secondary);
        font-size: 13px;
        font-weight: 600;
      }

      .metric-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        margin-top: 28px;
      }

      .metric-card,
      .flow-card,
      .note-card {
        border: 1px solid var(--border-default);
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.82);
      }

      .metric-card {
        padding: 20px 22px;
      }

      .metric-card span,
      .flow-step span {
        display: block;
        color: var(--text-tertiary);
        font-size: 13px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .metric-card strong {
        display: block;
        margin-top: 10px;
        font-size: 22px;
        line-height: 1.28;
        letter-spacing: -0.03em;
      }

      .metric-card p {
        margin: 10px 0 0;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.55;
      }

      .right-stack {
        display: grid;
        gap: 20px;
      }

      .flow-card {
        display: grid;
        gap: 16px;
        padding: 24px;
      }

      .flow-step {
        display: grid;
        gap: 6px;
        padding: 14px 0;
        border-top: 1px solid var(--border-default);
      }

      .flow-step:first-child {
        border-top: 0;
        padding-top: 0;
      }

      .flow-step strong {
        font-size: 20px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .flow-step p {
        margin: 0;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.55;
      }

      .note-card {
        padding: 24px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.94) 0%, rgba(243, 248, 252, 0.94) 100%);
      }

      .note-card h2 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: -0.03em;
      }

      .note-list {
        display: grid;
        gap: 10px;
        margin-top: 18px;
      }

      .note-item {
        display: flex;
        gap: 10px;
        align-items: flex-start;
        color: var(--text-secondary);
        font-size: 14px;
        line-height: 1.55;
      }

      .dot {
        width: 10px;
        height: 10px;
        margin-top: 8px;
        border-radius: 999px;
        background: var(--status-success);
        box-shadow: 0 0 0 8px rgba(47, 158, 91, 0.1);
        flex: none;
      }
    </style>
  </head>
  <body>
    <main class="poster">
      <section class="frame">
        <div class="grid">
          <div>
            <span class="eyebrow">__EYEBROW__</span>
            <h1>__TITLE_LINES__</h1>
            <p class="lead">__LEAD__</p>
            <div class="chips">
__CHIPS__
            </div>
            <div class="metric-grid">
__METRICS__
            </div>
          </div>

          <div class="right-stack">
            <article class="flow-card">
__STEPS__
            </article>

            <article class="note-card">
              <h2>__NOTE_TITLE__</h2>
              <div class="note-list">
__NOTES__
              </div>
            </article>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
