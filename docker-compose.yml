services:
  db:
    image: postgis/postgis:16-3.4
    container_name: commercial-area-analysis-db
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-commercial_area_analysis}
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
    ports:
      - "5432:5432"
    volumes:
      - commercial-area-analysis-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-app} -d ${POSTGRES_DB:-commercial_area_analysis}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  commercial-area-analysis-db:

